<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROC AUC — Model Comparison</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  body { font-family: sans-serif; background: #fff; color: #1a1a1a; padding: 24px; max-width: 700px; margin: 0 auto; }
  h2 { font-size: 18px; font-weight: 500; margin: 0 0 8px; }
  .legend { display: flex; gap: 16px; margin-bottom: 12px; font-size: 12px; color: #666; flex-wrap: wrap; }
  .legend span { display: flex; align-items: center; gap: 4px; }
  .swatch { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }
</style>
</head>
<body>

<h2>ROC AUC — all models (primary ranking metric)</h2>

<div class="legend">
  <span><span class="swatch" style="background:#1D9E75;"></span>Tuned</span>
  <span><span class="swatch" style="background:#B5D4F4;"></span>Baseline</span>
  <span><span class="swatch" style="background:#D3D1C7;"></span>Weak</span>
</div>

<div style="position:relative; width:100%; height:280px;">
  <canvas id="roc" role="img" aria-label="Horizontal bar chart showing ROC AUC scores for 8 models. GB Tuned leads at 0.847, Decision Tree lowest at 0.651.">
    ROC AUC scores: GB Tuned 0.847, LR Tuned 0.844, Gradient Boosting 0.846, Logistic Regression 0.844, Random Forest 0.819, XGBoost 0.820, KNN 0.791, Decision Tree 0.651.
  </canvas>
</div>

<script>
const models  = ['GB (tuned)', 'LR (tuned)', 'Grad. Boosting', 'Log. Regression',
                 'Random Forest', 'XGBoost', 'KNN', 'Decision Tree'];
const rocAuc  = [0.8470, 0.8435, 0.8460, 0.8435, 0.8188, 0.8196, 0.7911, 0.6506];
const colors  = rocAuc.map((v, i) =>
  i < 2 ? '#1D9E75' : (v < 0.7 ? '#D3D1C7' : '#B5D4F4')
);

new Chart(document.getElementById('roc'), {
  type: 'bar',
  data: {
    labels: models,
    datasets: [{
      data: rocAuc,
      backgroundColor: colors,
      borderWidth: 0,
      borderRadius: 4,
      indexAxis: 'y'
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    indexAxis: 'y',
    plugins: {
      legend: { display: false },
      tooltip: { callbacks: { label: c => ' ROC AUC: ' + c.formattedValue } }
    },
    scales: {
      x: {
        grid: { color: 'rgba(128,128,128,0.15)' },
        ticks: { color: '#888780', font: { size: 11 } },
        min: 0.6,
        max: 0.88
      },
      y: {
        grid: { display: false },
        ticks: { color: '#888780', font: { size: 12 } }
      }
    }
  }
});
</script>

</body>
</html>
